<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Nezabudni testovacia – spoločné pripomienky Ivana a Dominiky" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <title>Nezabudni testovacia</title>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card"><div class="upd-spinner"></div><div>Spúšťam Nezabudni…</div></div>
  </div>

  <section id="authScreen" class="auth-screen" hidden>
    <div class="auth-card">
      <div class="auth-logo"><span class="dot"></span>Nezabudni</div>
      <p class="auth-sub">Testovacia spoločná aplikácia pre Ivana a Dominiku. Prihlásenie zostane v telefóne uložené.</p>
      <form id="loginForm" class="auth-form">
        <div class="field"><label for="loginEmail">E-mail</label><input id="loginEmail" type="email" autocomplete="email" required placeholder="meno@email.sk" /></div>
        <div class="field"><label for="loginPassword">Heslo</label><input id="loginPassword" type="password" autocomplete="current-password" required placeholder="••••••••" /></div>
        <div id="loginError" class="auth-error"></div>
        <button class="save-btn" type="submit">Prihlásiť</button>
        <button id="demoBtn" class="secondary-btn" type="button" hidden>Spustiť ukážkový režim</button>
      </form>
      <p id="setupHint" class="auth-meta"></p>
      <button id="retryBootBtn" class="secondary-btn" type="button" hidden>Skúsiť znova</button>
    </div>
  </section>

  <div id="offlineBanner" class="offline-banner" hidden>Offline – zmeny sa odošlú po pripojení</div>

  <div id="app" hidden>
    <header>
      <div class="h-top">
        <div><div class="brand"><span class="dot"></span>Nezabudni</div><div class="date-line" id="dateLine"></div></div>
        <div class="header-actions">
          <div class="user-chip" id="userChip"><span class="user-avatar" id="userAvatar">I</span><span><strong id="userName">Ivan</strong><span id="syncState">pripojené</span></span></div>
          <button class="icon-btn" id="settingsBtn" aria-label="Nastavenia">⚙</button>
        </div>
      </div>
    </header>
    <div class="tabs" id="tabs"></div>
    <main id="main"></main>
    <button class="fab" id="addTaskBtn"><span class="plus">+</span> Pridať úlohu</button>
  </div>

  <div class="scrim" id="scrim"></div>
  <section class="sheet" id="taskSheet" aria-modal="true" role="dialog">
    <div class="grab"></div><h2 id="sheetTitle">Nová úloha</h2>
    <form id="taskForm">
      <div class="field"><label for="fTitle">Názov úlohy</label><input id="fTitle" maxlength="180" autocomplete="off" required placeholder="Napr. Zavolať lekárovi" /></div>
      <div class="field"><label for="fNote">Poznámka (voliteľné)</label><textarea id="fNote" maxlength="4000" placeholder="Detaily…"></textarea></div>
      <div class="field"><label for="fAssigned">Komu má úloha patriť</label><select id="fAssigned"></select><p class="field-help">Upozornenia v čase úlohy dostane iba vybraná osoba.</p></div>
      <div class="field partner-notify" id="notifyCreatorWrap" hidden>
        <label class="check-row" for="fNotifyCreator"><input id="fNotifyCreator" type="checkbox" /> <span class="check-label">Upozorni ma, keď partner úlohu splní</span></label>
      </div>
      <div class="field">
        <label>Prílohy — obrázky a dokumenty</label>
        <input type="file" id="fFiles" multiple hidden />
        <button type="button" class="img-add-btn" id="addFilesBtn">📎 Pridať prílohy</button>
        <div id="fAttList"></div><div id="fileProgress" class="file-progress"></div>
      </div>
      <div class="row2"><div class="field"><label for="fDate">Dátum</label><input type="date" id="fDate" required /></div><div class="field"><label for="fTime">Čas</label><input type="time" id="fTime" required /></div></div>
      <div id="fCountdown" class="countdown-hint"></div>
      <div class="field"><label>Priorita</label><div class="prio-pick" id="fPrio"><button type="button" data-p="1" class="sel">★ Bežná</button><button type="button" data-p="2">★★ Dôležitá</button><button type="button" data-p="3">★★★ Veľmi</button></div></div>
      <div class="row2">
        <div class="field"><label for="fPre">Predpripomienka</label><select id="fPre"><option value="0">Žiadna</option><option value="1">1 min pred</option><option value="5">5 min pred</option><option value="10">10 min pred</option><option value="15">15 min pred</option><option value="30">30 min pred</option><option value="60">1 hodinu pred</option><option value="1440">1 deň pred</option></select></div>
        <div class="field"><label for="fRec">Opakovanie</label><select id="fRec"><option value="none">Žiadne</option><option value="daily">Denne</option><option value="weekly">Týždenne</option><option value="monthly">Mesačne</option></select></div>
      </div>
      <div class="field" id="fRecModeWrap" hidden><label for="fRecMode">Kedy vytvoriť ďalší výskyt</label><select id="fRecMode"><option value="after">Až keď splním tento</option><option value="each">V každom termíne</option></select></div>
      <div class="row2"><div class="field"><label for="fInterval">Opakovať alarm</label><select id="fInterval"><option value="60">každú 1 min</option><option value="300">každých 5 min</option><option value="600">každých 10 min</option></select></div><div class="field"><label for="fMaxReminders">Najviac</label><select id="fMaxReminders"><option value="1">1×</option><option value="5">5×</option><option value="10" selected>10×</option><option value="20">20×</option></select></div></div>
      <div class="field"><label class="check-row disabled"><input id="fGcal" type="checkbox" disabled /> <span class="check-label">📅 Google Kalendár – bude doplnený po stabilizácii jadra</span></label></div>
      <div class="form-actions"><button class="save-btn" type="submit">Uložiť úlohu</button><button class="del-btn" id="deleteTaskBtn" type="button" hidden>Vymazať úlohu</button><button class="danger-link" id="closeSheetBtn" type="button">Zavrieť</button></div>
    </form>
  </section>

  <div class="alarm-scrim" id="alarmScrim">
    <div class="alarm-box" id="alarmBox"><div class="alarm-bell">🔔</div><div class="at">Čas úlohy</div><h3 id="alarmTitle"></h3><div class="anote" id="alarmNote"></div><button class="alarm-ok" id="alarmOkBtn">👍 OK — počul som</button><div class="snz-row"><button id="snooze15Btn">⏰ Odložiť 15 min</button><button id="snooze60Btn">⏰ Odložiť 1 h</button></div><button class="alarm-done" id="alarmDoneBtn">✓ Hotovo</button><button class="alarm-open" id="alarmOpenBtn">Otvoriť úlohu</button></div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
