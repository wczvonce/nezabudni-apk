openapi: 3.1.0
info:
  title: Nezabudni Action API
  version: 1.1.0
  description: >-
    Súkromné API na načítanie kontextu dvojice a bezpečné vytvorenie úlohy
    v aplikácii Nezabudni. API nevystavuje zoznam úloh ani administračné dáta.
servers:
  - url: https://ofwouqpqzcpjnigcgygz.supabase.co/functions/v1/chatgpt-api
security:
  - NezabudniActionKey: []
paths:
  /context:
    get:
      operationId: getNezabudniContext
      summary: Načíta miestny čas, používateľa, partnera a predvolené hodnoty
      description: >-
        Zavolaj pred prvým vytvorením úlohy v konverzácii a vždy, keď treba
        správne vyriešiť relatívny dátum alebo meno partnera. Nevykonáva zápis.
      responses:
        '200':
          description: Kontext pripojeného používateľa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /reminders:
    post:
      operationId: createNezabudniReminder
      summary: Vytvorí jednu úlohu v aplikácii Nezabudni
      description: >-
        Vykonaj iba po výslovnom potvrdení používateľa. Posielaj miestny dátum
        a miestny čas; správny UTC offset a zmenu letného alebo zimného času
        vypočíta server. Pri retry vždy znovu použi rovnaký request_id a rovnaký obsah.
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '200':
          description: Úloha bola vytvorená alebo bol bezpečne vrátený výsledok rovnakého request_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReminderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
components:
  securitySchemes:
    NezabudniActionKey:
      type: apiKey
      in: header
      name: x-nezabudni-action-key
      description: Revokovateľný náhodný token uložený iba v nastavení súkromného GPT.
  schemas:
    Person:
      type: object
      additionalProperties: false
      required: [display_name]
      properties:
        display_name:
          type: string
    Defaults:
      type: object
      additionalProperties: false
      required:
        - priority
        - pre_reminder_minutes
        - recurrence_rule
        - recurrence_mode
        - notify_creator_on_complete
        - reminder_interval_seconds
        - max_reminders
      properties:
        priority: { type: integer, minimum: 1, maximum: 3 }
        pre_reminder_minutes: { type: integer, minimum: 0, maximum: 10080 }
        recurrence_rule: { type: string, enum: [none, daily, weekly, monthly] }
        recurrence_mode: { type: string, enum: [after, each] }
        notify_creator_on_complete: { type: boolean }
        reminder_interval_seconds: { type: integer, minimum: 60, maximum: 86400 }
        max_reminders: { type: integer, minimum: 1, maximum: 50 }
    ContextResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - server_now
        - server_local_date
        - server_local_time
        - timezone
        - actor
        - partner
        - defaults
      properties:
        ok:
          type: boolean
          const: true
        server_now:
          type: string
          format: date-time
          description: Autoritatívny aktuálny UTC čas servera.
        server_local_date:
          type: string
          format: date
          description: Aktuálny dátum v Europe/Bratislava.
        server_local_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Aktuálny miestny čas v Europe/Bratislava.
        timezone:
          type: string
          const: Europe/Bratislava
        actor:
          $ref: '#/components/schemas/Person'
        partner:
          $ref: '#/components/schemas/Person'
        defaults:
          $ref: '#/components/schemas/Defaults'
    CreateReminderRequest:
      type: object
      additionalProperties: false
      required:
        - request_id
        - title
        - local_date
        - local_time
        - timezone
        - assignee
        - notify_creator_on_complete
      properties:
        request_id:
          type: string
          format: uuid
          description: >-
            Idempotency identifikátor jednej zamýšľanej úlohy. Pri retry musí zostať
            rovnaký; pre inú úlohu musí byť nový.
        title:
          type: string
          minLength: 1
          maxLength: 180
        notes:
          type: [string, 'null']
          maxLength: 10000
        local_date:
          type: string
          format: date
          description: Miestny kalendárny dátum v Europe/Bratislava.
        local_time:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          description: Miestny čas HH:MM. UTC offset nevypočítava GPT, ale server.
        timezone:
          type: string
          const: Europe/Bratislava
        ambiguous_time_choice:
          type: string
          enum: [earlier, later]
          description: >-
            Použi iba po chybe AMBIGUOUS_LOCAL_TIME a po voľbe používateľa:
            earlier je prvý výskyt, later druhý výskyt dvojitého času.
        assignee:
          type: string
          enum: [self, partner]
          description: self je používateľ konektora; partner je osoba z getNezabudniContext.
        priority:
          type: integer
          minimum: 1
          maximum: 3
          default: 1
        pre_reminder_minutes:
          type: integer
          minimum: 0
          maximum: 10080
          default: 0
        recurrence_rule:
          type: string
          enum: [none, daily, weekly, monthly]
          default: none
        recurrence_mode:
          type: string
          enum: [after, each]
          default: after
        notify_creator_on_complete:
          type: boolean
          default: false
          description: Keď je true a úloha je pre partnera, autor dostane upozornenie po splnení.
        reminder_interval_seconds:
          type: integer
          minimum: 60
          maximum: 86400
          default: 60
        max_reminders:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
    CreateReminderResponse:
      type: object
      additionalProperties: false
      required: [ok, request_id, task, confirmation]
      properties:
        ok:
          type: boolean
          const: true
        request_id:
          type: string
          format: uuid
        task:
          type: object
          additionalProperties: false
          required:
            - id
            - title
            - local_date
            - local_time
            - utc_offset
            - due_at
            - timezone
            - assigned_to
            - created_by
            - notify_creator_on_complete
            - status
          properties:
            id: { type: string, format: uuid }
            title: { type: string }
            local_date: { type: string, format: date }
            local_time: { type: string }
            utc_offset: { type: string }
            due_at: { type: string, format: date-time }
            timezone: { type: string }
            assigned_to: { $ref: '#/components/schemas/Person' }
            created_by: { $ref: '#/components/schemas/Person' }
            notify_creator_on_complete: { type: boolean }
            recurrence_rule: { type: string }
            status: { type: string }
        confirmation:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [ok, error]
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
  responses:
    BadRequest:
      description: Neplatné údaje alebo miestny čas, ktorý pri zmene hodiniek neexistuje
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Chýbajúci, neplatný, zrušený alebo expirovaný konektorový token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Konektor nemá povolenie na operáciu
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Konflikt idempotencie, konfigurácie dvojice alebo dvojznačný jesenný miestny čas
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: Minútový alebo denný ochranný limit nových úloh bol prekročený
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
