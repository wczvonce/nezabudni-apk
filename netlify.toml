[build]
  command = "npm run build"
  publish = "dist"

# Zmazaný (starý) hashovaný asset NESMIE spadnúť do SPA fallbacku – vrátil by
# index.html s ročnou immutable hlavičkou a service worker by HTML navždy
# cachoval ako JS/CSS (rozbitá appka až do vyčistenia úložiska).
[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
