[build]
  command = "npm run build"
  publish = "dist"

# Zmazaný (starý) hashovaný asset NESMIE spadnúť do SPA fallbacku – vrátil by
# index.html s ročnou immutable hlavičkou a service worker by HTML navždy
# cachoval ako JS/CSS (rozbitá appka až do vyčistenia úložiska).
[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer"
    # Audit A8: CSP zatiaľ len v REPORT-ONLY režime — nič nerozbije, len loguje
    # porušenia do konzoly. Po overení v praxi premenovať na Content-Security-Policy.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' https://cdn.onesignal.com; connect-src 'self' https://ofwouqpqzcpjnigcgygz.supabase.co wss://ofwouqpqzcpjnigcgygz.supabase.co https://api.onesignal.com https://cdn.onesignal.com https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# OneSignal web push service worker – rovnako ako /sw.js sa nesmie kešovať,
# inak by po zmene worker súboru zostala v prehliadači stará verzia.
[[headers]]
  for = "/push/onesignal/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
