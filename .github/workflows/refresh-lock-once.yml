name: Refresh patched lockfile once

on:
  push:
    branches: [agent/chatgpt-action-integration]

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/chatgpt-action-integration
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Generate lockfile from reviewed overrides
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit only package-lock.json
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "fix: refresh patched dependency lockfile"
          git push origin HEAD:agent/chatgpt-action-integration
