name: CI

on:
  push:
    branches: [main, goal-android-stabilization]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: Tests, SQL, Edge Functions, build, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: denoland/setup-deno@v2
        with:
          deno-version: '2.8.1'
      - name: ChatGPT Edge Function Deno type-check
        run: deno check supabase/functions/chatgpt-api/index.ts
      - name: Clean install
        run: npm ci
      - name: ChatGPT timezone behavior
        run: node tests/chatgpt-timezone.test.mjs
      - name: ChatGPT static security contract
        run: node tests/chatgpt-integration-static.test.mjs
      - name: ChatGPT SQL behavior and completion notification
        run: node tests/chatgpt-integration-sql.test.mjs
      - name: Full project audit
        run: npm run audit
      - name: Dependency security audit
        id: dependency_audit
        continue-on-error: true
        run: npm run audit:dependencies > dependency-audit.log 2>&1
      - name: Upload dependency audit diagnostics
        if: steps.dependency_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-log
          path: dependency-audit.log
          if-no-files-found: error
      - name: Enforce dependency audit result
        if: steps.dependency_audit.outcome == 'failure'
        run: exit 1

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Len to, čo assembleDebug reálne potrebuje. Default ťahá aj balík
          # emulátora, ktorého download na runneroch opakovane padá na
          # „Error on ZipFile unknown archive" (flaky CI 2026-07-08 a 07-09).
          packages: 'platform-tools'
      - name: Clean install
        run: npm ci
      - name: Validate Android package
        run: npm run check:android
      - name: Build web + sync Android
        run: |
          npm run build
          npx cap sync android
      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
